{% load static %}
<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="icon"
      type="image/png"
      href="{% static 'assets/images/favicon.png' %}"
    />
    <title>Re:Link</title>

    <link rel="stylesheet" href="{% static 'css/global.css' %}" />
    <link rel="stylesheet" href="{% static 'css/common.css' %}" />
    <link rel="stylesheet" href="{% static 'css/matching.css' %}" />
  </head>

  <body>
    <div id="app">
      <main class="matching-loading" aria-labelledby="matching-loading-title">
        <img
          class="matching-loading__image"
          src="{% static 'assets/images/match-loading.png' %}"
          alt=""
        />

        <h1 id="matching-loading-title">딱 맞는 파트너를 찾고있어요.</h1>
        <p>
          작성해주신 프로필을 바탕으로<br />
          파트너를 분석 중입니다.
        </p>

        <div class="matching-loading__spinner" role="status">
          <span class="sr-only">파트너 분석 중</span>
        </div>

        <a
          class="green-btn matching-loading__edit"
          href="{% url 'user:mypage_home' %}"
        >
          프로필 수정하기
        </a>
      </main>
    </div>

    <script>
      window.setTimeout(function () {
        window.location.replace("{% url 'match:matching_list' %}");
      }, 3000);
    </script>
  </body>
</html>
