{% load static %}
<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="{% static 'css/global.css' %}" />
    <link rel="stylesheet" href="{% static 'css/account/signup.css' %}" />
    <link
      rel="icon"
      type="image/png"
      href="{% static 'assets/images/favicon.png' %}"
    />
    <title>Re:Link</title>
  </head>
  <body>
    <div id="app">
      <main class="signup-container">
        <p class="title">회원가입</p>

        <form
          class="signup-form"
          method="post"
          action="{% url 'user:signup' %}"
          novalidate
        >
          {% csrf_token %}

          <!-- 이메일 -->
          <div class="form-group">
            <label>
              이메일
              <img
                src="{% static 'assets/icons/required.svg' %}"
                class="required-icon"
              />
            </label>
            <input
              type="email"
              name="email"
              placeholder="이메일을 입력하세요."
              value="{{ form.email.value|default:'' }}"
            />

            <small class="error-msg">필수 항목을 입력하세요.</small>
          </div>

          <!-- 비밀번호 -->
          <div class="form-group">
            <label>
              비밀번호
              <img
                src="{% static 'assets/icons/required.svg' %}"
                class="required-icon"
              />
            </label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="비밀번호를 입력하세요."
            />

            <small class="error-msg">필수 항목을 입력하세요.</small>
          </div>

          <!-- 비밀번호 확인 -->
          <div class="form-group">
            <label>
              비밀번호 확인
              <img
                src="{% static 'assets/icons/required.svg' %}"
                class="required-icon"
              />
            </label>
            <input
              type="password"
              id="password-check"
              name="password_confirm"
              placeholder="비밀번호를 다시 한 번 입력하세요."
            />

            <small class="error-msg">필수 항목을 입력하세요.</small>
          </div>

          <!-- 이름 -->
          <div class="form-group">
            <label>이름</label>
            <input
              type="text"
              name="name"
              placeholder="이름을 입력하세요."
              value="{{ form.name.value|default:'' }}"
            />

            <small class="error-msg">필수 항목을 입력하세요.</small>
          </div>

          <!-- 약관동의 -->
          <div class="agreement">
            <label>약관동의</label>

            <small class="agree-error"> 필수 항목을 선택하세요. </small>

            <div class="check-item">
              <input type="checkbox" />
              <span> 전체동의 </span>
            </div>

            <div class="check-item required-item">
              <input type="checkbox" class="required-check" />
              <span>
                이용약관 동의
                <img
                  src="{% static 'assets/icons/required.svg' %}"
                  class="required-icon"
                />
              </span>
            </div>

            <div class="check-item required-item">
              <input type="checkbox" class="required-check" />
              <span>
                개인정보 수집 및 이용 동의
                <img
                  src="{% static 'assets/icons/required.svg' %}"
                  class="required-icon"
                />
              </span>
            </div>

            <div class="check-item">
              <input type="checkbox" />
              <span>마케팅 정보 수신 동의</span>
            </div>
          </div>

          <button type="submit" class="green-btn">회원가입 완료</button>
        </form>
      </main>
    </div>

    <script src="{% static 'js/account/signup.js' %}"></script>
  </body>
</html>
